name = "discord_luau/classes"
version = "0.0.5"
description = "Discord-Luau Classes - Objects that wrap around various discord API structures."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/classes"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "patches/**/*",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { name = "discord_luau/std_polyfills", version = ">=0.0.0" }
api_types = { name = "discord_luau/api_types", version = ">=0.0.0" }
util = { name = "discord_luau/util", version = ">=0.0.0" }
state = { name = "discord_luau/state", version = ">=0.0.0" }
future = { name = "yetanotherclown/luau_futures", version = "2.0.0-beta.3" }
builders = { name = "discord_luau/builders", version = ">=0.0.0" }
rest = { name = "discord_luau/rest", version = ">=0.0.0" }
bit = { name = "discord_luau/bit", version = ">=0.0.0" }
voice = { name = "discord_luau/voice", version = ">=0.0.0" }
emitter = { name = "discord_luau/emitter", version = ">=0.0.0" }

[patches]
"yetanotherclown/luau_futures" = { "2.0.0-beta.3 luau" = "patches/yetanotherclown+luau_futures-2.0.0-beta.3+luau.patch" }
