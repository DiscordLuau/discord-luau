name = "discord_luau/create_app"
version = "0.0.3"
description = "DiscordLuau - Create App, an interactive command-line tool to scaffold a new Discord bot project in Luau."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/create_app"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "bin.luau",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "patches/**/*",
]

[target]
environment = "luau"
bin = "bin.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { name = "discord_luau/std_polyfills", version = "0.0.2" }
logger = { name = "discord_luau/logger", version = "0.0.1" }
cli_builder = { name = "4x8matrix/cli_builder", version = "0.1.0-dev.1" }
cli_tui = { name = "4x8matrix/tui", version = "0.1.0-dev.2" }
