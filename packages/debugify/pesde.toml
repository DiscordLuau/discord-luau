name = "discord_luau/debuggify"
version = "0.0.3"
description = "Discord-Luau Debuggify - Collect and display diagnostic information to help troubleshoot Discord-Luau issues."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/debuggify"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "bin.luau",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
]

[target]
environment = "luau"
bin = "bin.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { name = "discord_luau/std_polyfills", version = ">=0.0.0" }
cli_builder = { name = "4x8matrix/cli_builder", version = "0.1.0-dev.1" }
