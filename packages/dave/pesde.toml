name = "discord_luau/dave"
version = "0.0.2"
description = "Discord Luau Dave - Implementation of the End to End encryption DAVE protocol for discord."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/voice"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "patches/**/*",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
binary = { name = "discord_luau/binary", version = "0.0.2" }
logger = { name = "discord_luau/logger", version = "0.0.2" }
std_polyfills = { name = "discord_luau/std_polyfills", version = "0.0.2" }
