name = "discord_luau/builders"
version = "0.0.4"
description = "Discord-Luau Builders - Builders used to generate payloads that the discord API can parse."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/builder"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "patches/**/*",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { name = "discord_luau/std_polyfills", version = ">=0.0.0" }
api_types = { name = "discord_luau/api_types", version = ">=0.0.0" }
util = { name = "discord_luau/util", version = ">=0.0.0" }
bit = { name = "discord_luau/bit", version = ">=0.0.0" }
