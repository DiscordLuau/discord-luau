name = "discord_luau/voice"
version = "0.0.1"
description = "Discord Luau Voice - Implementation of the voice protocol for discord."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/voice"
pesde_version = "0.7.0-rc.7"

includes = ["src/**/*", "pesde.toml", "LICENSE", "README.md", "CONTRIBUTING.md"]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
util = { workspace = "discord_luau/util" }
std_polyfills = { workspace = "discord_luau/std_polyfills" }
api_types = { workspace = "discord_luau/api_types" }
future = { name = "yetanotherclown/luau_futures", version = "2.0.0-beta.3" }
logger = { workspace = "discord_luau/logger" }
emitter = { workspace = "discord_luau/emitter" }
secret = { workspace = "discord_luau/secret" }
buffer = { workspace = "discord_luau/buffer" }
