name = "discord_luau/state"
version = "0.0.3"
description = "Discord-Luau State - contains the state for a discord bot."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/state"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "patches/**/*",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { name = "discord_luau/std_polyfills", version = ">=0.0.0" }
api_types = { name = "discord_luau/api_types", version = ">=0.0.0" }
utils = { name = "discord_luau/util", version = ">=0.0.0" }
websocket = { name = "discord_luau/websocket", version = ">=0.0.0" }
rest = { name = "discord_luau/rest", version = ">=0.0.0" }
secret = { name = "discord_luau/secret", version = ">=0.0.0" }
formdata = { name = "discord_luau/formdata", version = ">=0.0.0" }
logger = { name = "discord_luau/logger", version = ">=0.0.0" }
