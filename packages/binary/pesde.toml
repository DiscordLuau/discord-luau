name = "discord_luau/binary"
version = "0.0.1"
description = "Platform binary acquisition layer for FFI packages - resolves, caches, and downloads native shared libraries"
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/binary"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { workspace = "discord_luau/std_polyfills" }
sha256 = { name = "kimpure/sha256", version = "0.1.1" }
