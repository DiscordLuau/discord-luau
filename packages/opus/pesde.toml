name = "discord_luau/opus"
version = "0.0.1"
description = "Discord Luau Opus - FFI bindings for libopus, providing Opus audio encoding and decoding."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/opus"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "patches/**/*",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
binary = { workspace = "discord_luau/binary" }
std_polyfills = { workspace = "discord_luau/std_polyfills" }
