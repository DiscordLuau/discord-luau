name = "discord_luau/sodium"
version = "0.0.1"
description = "Discord Luau Sodium - FFI bindings for libsodium, providing AES-256-GCM authenticated encryption."
license = "MIT"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]
repository = "https://github.com/DiscordLuau/discord-luau/tree/main/packages/sodium"
pesde_version = "0.7.0-rc.7"

includes = [
    "src/**/*",
    "binaries/**/*",
    "pesde.toml",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
std_polyfills = { workspace = "discord_luau/std_polyfills" }
