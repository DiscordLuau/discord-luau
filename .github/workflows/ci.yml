name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install tooling
        uses: CompeyDev/setup-rokit@v0.1.0
        with:
          cache: true
      - name: Check formatting
        run: zune run .zune/fmt.luau

  lint:
    runs-on: ubuntu-latest
    needs: ["fmt"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install tooling
        uses: CompeyDev/setup-rokit@v0.1.0
        with:
          cache: true
      - name: Lint
        run: zune run .zune/lint.luau
  typecheck:
    runs-on: ubuntu-latest
    needs: ["lint"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pesde
        uses: lumin-org/setup-pesde@v0.4.1
        with:
          cache: true
          version: v0.7.0-rc.7+registry.0.2.3-rc.3
      - name: Install tooling
        uses: CompeyDev/setup-rokit@v0.1.0
        with:
          cache: true
      - name: Setup zune typedefs
        run: zune setup
      - name: Bundle api-types
        run: zune run .zune/bundle.luau
      - name: Install dependencies
        run: pesde install
      - name: Typecheck
        run: zune run .zune/analyze.luau
  test:
    runs-on: ubuntu-latest
    needs: ["typecheck"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pesde
        uses: lumin-org/setup-pesde@v0.4.1
        with:
          cache: true
          version: v0.7.0-rc.7+registry.0.2.3-rc.3
      - name: Install tooling
        uses: CompeyDev/setup-rokit@v0.1.0
        with:
          cache: true
      - name: Bundle api-types
        run: zune run .zune/bundle.luau
      - name: Install dependencies
        run: pesde install
      - name: Run unit-tests
        run: zune run .zune/test.luau
